// ---------- helpers ----------
const $ = (s,r=document)=>r.querySelector(s);
const ZCOLOR = {1:'var(--z1)',2:'var(--z2)',3:'var(--z3)'};
const f0 = x => (x==null||isNaN(x))?'—':Math.round(x).toLocaleString();
const f1 = x => (x==null||isNaN(x))?'—':(Math.round(x*10)/10).toLocaleString(undefined,{minimumFractionDigits:1});
const pct = x => (x==null||isNaN(x))?'—':Math.round(x*100)+'%';
function effClass(r){ if(r==null||isNaN(r))return 'mut'; return r>=1?'good':(r>=0.85?'warn':'bad'); }
function el(tag,attrs={},...kids){ const e=document.createElement(tag);
  for(const k in attrs){ if(k==='class')e.className=attrs[k]; else if(k==='html')e.innerHTML=attrs[k]; else if(attrs[k]!=null)e.setAttribute(k,attrs[k]); }
  kids.flat().forEach(k=>{ if(k==null||k==='')return; e.append(k.nodeType?k:document.createTextNode(k)); }); return e; }

const META = RESULTS.meta||{};
const ZONES = Object.keys(RESULTS.zones||{}).sort((a,b)=>a-b);
const ACTIVE = META.active_belts||[];
const beltKey = n => 'PD'+String(n).padStart(2,'0')+'HVD';
const beltsActive = ACTIVE.map(beltKey).filter(k=>RESULTS.belts[k]);
const hasSor = !!META.has_sor;

// ---------- charts (inline SVG) ----------
function lineChart(series, opts={}){
  const w=opts.w||620, h=opts.h||190, pad={l:42,r:12,t:12,b:26};
  const xs=opts.xlabels||[]; const n=Math.max(...series.map(s=>s.pts.length),1);
  const allY=series.flatMap(s=>s.pts).filter(v=>v!=null&&!isNaN(v));
  let mn=Math.min(...allY,0), mx=Math.max(...allY,1); if(mn===mx)mx=mn+1;
  const X=i=> pad.l + (n<=1?0:(i/(n-1)))*(w-pad.l-pad.r);
  const Y=v=> pad.t + (1-(v-mn)/(mx-mn))*(h-pad.t-pad.b);
  let svg=`<svg viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="xMidYMid meet">`;
  for(let g=0;g<=3;g++){const yy=pad.t+g/3*(h-pad.t-pad.b);const val=mx-(g/3)*(mx-mn);
    svg+=`<line class="grid" x1="${pad.l}" y1="${yy}" x2="${w-pad.r}" y2="${yy}"/><text x="${pad.l-6}" y="${yy+3}" text-anchor="end">${Math.round(val)}</text>`;}
  xs.forEach((lb,i)=>{ if(xs.length>8 && i%Math.ceil(xs.length/8))return;
    svg+=`<text x="${X(i)}" y="${h-8}" text-anchor="middle">${lb}</text>`; });
  series.forEach(s=>{ let d=''; s.pts.forEach((v,i)=>{ if(v==null||isNaN(v))return; d+=(d?'L':'M')+X(i)+' '+Y(v)+' '; });
    svg+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.2" stroke-linejoin="round"/>`;
    s.pts.forEach((v,i)=>{ if(v==null||isNaN(v))return; svg+=`<circle cx="${X(i)}" cy="${Y(v)}" r="2.6" fill="${s.color}"/>`; }); });
  svg+='</svg>'; return svg;
}

// ---------- table (sortable) ----------
function makeTable(cols, rows, opts={}){
  const tbl=el('table'); const thead=el('thead'); const trh=el('tr');
  cols.forEach((c,ci)=>{ const th=el('th',{},c.label); trh.append(th);
    th.onclick=()=>{ tbl.__dir=(tbl.__lastci===ci?-(tbl.__dir||-1):-1); tbl.__lastci=ci;
      doSort(cols,tbl.__rows,ci,tbl.__dir); renderRows(tb,cols,tbl.__rows); markSort(tbl,ci,tbl.__dir); }; });
  thead.append(trh); tbl.append(thead);
  const tb=el('tbody'); tbl.append(tb); tbl.__rows=rows; tbl.__tb=tb;
  if(opts.sortDefault!=null){ tbl.__dir=opts.asc?1:-1; tbl.__lastci=opts.sortDefault;
    doSort(cols,rows,opts.sortDefault,tbl.__dir); markSort(tbl,opts.sortDefault,tbl.__dir); }
  renderRows(tb,cols,rows); return tbl;
}
function renderRows(tb,cols,rows){ tb.innerHTML=''; rows.forEach(r=>{ const tr=el('tr');
  cols.forEach(c=>{ const td=el('td',{}); if(c.cls)td.className=c.cls;
    const v=c.html?c.html(r):(c.fmt?c.fmt(r[c.k],r):r[c.k]);
    if(v&&v.nodeType)td.append(v); else td.innerHTML=(v==null?'':v); tr.append(td); }); tb.append(tr); }); }
function doSort(cols,rows,ci,dir){ const c=cols[ci]; const key=c.sortk||c.k;
  rows.sort((a,b)=>{ let x=a[key],y=b[key]; if(x==null)x=-Infinity; if(y==null)y=-Infinity;
    if(typeof x==='string'||typeof y==='string')return dir*String(x).localeCompare(String(y));
    return dir*(x-y); }); }
function markSort(tbl,ci,dir){ tbl.querySelectorAll('th').forEach(t=>t.classList.remove('sort-asc','sort-desc'));
  tbl.querySelectorAll('th')[ci].classList.add(dir>0?'sort-asc':'sort-desc'); }

// ---------- KPI ----------
function kpi(lab,val,sub,subcls){ return el('div',{class:'kpi'},
  el('div',{class:'lab'},lab), el('div',{class:'val'},val), el('div',{class:'sub '+(subcls||'muted')},sub||'')); }

function flagsHTML(lp){ const f=[];
  if(lp.high_outlier)f.push('<span class="flag top">top</span>');
  if(lp.low_outlier)f.push('<span class="flag low">low-outlier</span>');
  if(lp.below_70pct_median&&!lp.low_outlier)f.push('<span class="flag coach">coach</span>');
  if(lp.low_exposure)f.push('<span class="flag exp">low-exp</span>');
  return f.join(' '); }

function allLoaderRows(){ const out=[];
  beltsActive.forEach(k=>{ const b=RESULTS.belts[k]; (b.loaders||[]).forEach(lp=>{
    out.push(Object.assign({belt:b.label,zone:b.zone},lp)); }); }); return out; }

    `(pre ${f1((ppo.overall||{}).pre_min)} min, wrap ${f1((ppo.overall||{}).post_min)} min).`}));
    const wr=Object.entries(ppo.per_user||{}).map(([u,d])=>({name:(RESULTS.users[u]||{}).display||u,
        pre:d.pre_min,post:d.post_min,est:d.est_net})).sort((a,b)=>b.est-a.est).slice(0,12);
    wc.append(makeTable([{k:'name',label:'Loader',cls:'name'},{k:'pre',label:'Pre min',fmt:f1},
       {k:'post',label:'Wrap min',fmt:f1},{k:'est',label:'Est. net',fmt:f0}],wr,{}));
  } else { wc.append(el('div',{class:'note'},'No operational window available.')); }
  row.append(wc); v.append(row);

  const mis=(RESULTS.slic||{}).misstaged||[];
  if(mis.length){ const mc=el('div',{class:'card'}); mc.append(el('h2',{},'SLIC mis-stage candidates'));
    const mr=mis.slice().sort((a,b)=>b.net-a.net).slice(0,12);
    mc.append(makeTable([{k:'slic',label:'SLIC'},{k:'dest',label:'Destination',cls:'name'},
      {k:'observed_belt',label:'Observed'},{k:'routing_home',label:'Home'},{k:'net',label:'Net',fmt:f0}],mr,{}));
    mc.append(el('div',{class:'note'},'Heuristic: a SLIC may legitimately stage on multiple belts — verify before acting.'));
    v.append(mc); }
  return v;
}

function viewZone(z){
  const zd=RESULTS.zones[z], o=RESULTS.overall, d=zd.loader_dist||{}, od=o.loader_dist||{};
  const v=el('div');
  const k=el('div',{class:'kpis'});
  k.append(kpi('Zone Net',f0(zd.net),pct(o.net?zd.net/o.net:null)+' of outbound'),
    kpi('Scan-PPH',f1(zd.pph_scan),'active scanning'),
    hasSor?kpi('Paid-PPH',f1(zd.pph_paid),'vs plan '+pct(zd.pph_vs_plan),effClass(zd.pph_vs_plan)):kpi('Loaders',f0(zd.headcount),''),
    kpi('Median PPH',f0(d.median),'per loader'),
    kpi('Consistency',(d.cv==null?'—':'CV '+f1(d.cv)),'lower = tighter'),
    kpi('Loaders',f0(zd.headcount),'in zone'));
  v.append(k);

  const cc=el('div',{class:'card'}); cc.append(el('h2',{},'This zone vs. the whole outbound operation'));
  const rows=[{w:'Zone '+z, pph_scan:zd.pph_scan,pph_paid:zd.pph_paid,vp:zd.pph_vs_plan,util:zd.scan_utilization,med:d.median,cv:d.cv},
    {w:'All outbound',pph_scan:o.pph_scan,pph_paid:o.pph_paid,vp:o.pph_vs_plan,util:o.scan_utilization,med:od.median,cv:od.cv}];
  const cols=[{k:'w',label:'',cls:'name'},{k:'pph_scan',label:'Scan-PPH',fmt:f1}];
  if(hasSor)cols.push({k:'pph_paid',label:'Paid-PPH',fmt:f1},{k:'vp',label:'vs Plan',fmt:pct},{k:'util',label:'Util',fmt:pct});
  cols.push({k:'med',label:'Median PPH',fmt:f0},{k:'cv',label:'CV',fmt:f1});
  cc.append(makeTable(cols,rows,{})); v.append(cc);

  const keys=(META.zones_pd[z]||[]).map(beltKey).filter(k=>RESULTS.belts[k]);
  const bc=el('div',{class:'card'}); bc.append(el('h2',{},'Belts in this zone'));
  const brows=keys.map(k=>{ const b=RESULTS.belts[k]; const bm=b.benchmark||{};
    return {belt:b.label,pd:b.pd,net:b.net,scan_h:b.scan_hours,pph_scan:b.pph_scan,pph_paid:b.pph_paid,
      plan:bm.planned_net_pph,vp:b.pph_vs_plan,util:b.scan_utilization,hc:b.headcount}; });
  const bcols=[{k:'belt',label:'Belt',sortk:'pd',cls:'name'},{k:'net',label:'Net',fmt:f0},{k:'scan_h',label:'Scan h',fmt:f1},
    {k:'pph_scan',label:'Scan-PPH',fmt:f1}];
  if(hasSor)bcols.push({k:'pph_paid',label:'Paid-PPH',fmt:f1},{k:'plan',label:'Plan PPH',fmt:f1},
    {k:'vp',label:'vs Plan',html:r=>`<span class="pill ${effClass(r.vp)}">${pct(r.vp)}</span>`});
  bcols.push({k:'hc',label:'HC',fmt:f0});
  bc.append(makeTable(bcols,brows,{sortDefault:0,asc:true})); v.append(bc);

  const lc=el('div',{class:'card'}); lc.append(el('h2',{},'Loader roster (this zone)'));
  const lrows=[]; keys.forEach(k=>(RESULTS.belts[k].loaders||[]).forEach(lp=>lrows.push(
    Object.assign({belt:RESULTS.belts[k].label},lp))));
  lc.append(makeTable([{k:'display',label:'Loader (name / scan id)',cls:'name'},{k:'belt',label:'Belt'},
    {k:'net',label:'Net',fmt:f0},{k:'scan_hours',label:'Scan h',fmt:f1},
    {k:'scan_pph',label:'Net PPH',fmt:f0},{k:'pctile',label:'%ile',fmt:x=>x==null?'—':x},
    {k:'_flags',label:'Flags',html:flagsHTML}],lrows,{sortDefault:4})); v.append(lc);

  const pp=RESULTS.prepost||{};
  if(pp.available){ const pc=el('div',{class:'card'}); pc.append(el('h2',{},'Wrap / outside-window — this zone'));
    const zpd=new Set(META.zones_pd[z]||[]);
    const wr=Object.entries(pp.per_user||{}).map(([u,dd])=>{ const belts=Object.keys(dd.belts||{}).filter(b=>zpd.has(+b.slice(2,4)));
      return belts.length?{name:(RESULTS.users[u]||{}).display||u,belts:belts.map(b=>'PD'+(+b.slice(2,4))).join(', '),
        pre:dd.pre_min,post:dd.post_min,est:dd.est_net}:null; }).filter(Boolean).sort((a,b)=>b.est-a.est);
    if(wr.length)pc.append(makeTable([{k:'name',label:'Loader',cls:'name'},{k:'belts',label:'Belt(s)'},
      {k:'pre',label:'Pre min',fmt:f1},{k:'post',label:'Wrap min',fmt:f1},{k:'est',label:'Est. net',fmt:f0}],wr,{}));
    else pc.append(el('div',{class:'note'},'No loaders scanned outside the window in this zone.'));
    v.append(pc); }
  return v;
}

function viewLoaders(){
  const v=el('div'); const rows=allLoaderRows();
  const c=el('div',{class:'card'}); c.append(el('h2',{},'All loaders'));
  const ctr=el('div',{class:'controls noprint'});
  const search=el('input',{type:'search',placeholder:'Search name or scan id…'});
  const zsel=el('select'); zsel.append(el('option',{value:''},'All zones'));
  ZONES.forEach(z=>zsel.append(el('option',{value:z},'Zone '+z)));
  ctr.append(search,zsel); c.append(ctr);
  const cols=[{k:'display',label:'Loader (name / scan id)',cls:'name'},{k:'belt',label:'Belt'},
    {k:'zone',label:'Z',fmt:x=>x==null?'—':x},{k:'net',label:'Net',fmt:f0},
    {k:'scan_hours',label:'Scan h',fmt:f1},{k:'scan_pph',label:'Net PPH',fmt:f0},
    {k:'pctile',label:'%ile',fmt:x=>x==null?'—':x},{k:'_flags',label:'Flags',html:flagsHTML}];
  const tbl=makeTable(cols,rows.slice(),{sortDefault:5}); c.append(tbl);
  function apply(){ const q=search.value.toLowerCase().trim(); const z=zsel.value;
    const filt=rows.filter(r=>(!q||(r.display||'').toLowerCase().includes(q))&&(!z||String(r.zone)===z));
    tbl.__rows=filt; doSort(cols,filt,tbl.__lastci==null?5:tbl.__lastci,tbl.__dir||-1); renderRows(tbl.__tb,cols,filt); }
  search.oninput=apply; zsel.onchange=apply;
  v.append(c); return v;
}

function viewHistory(){
  const v=el('div'); const H=HISTORY;
  if(!H||!H.available){ v.append(el('div',{class:'card'},el('h2',{},'Performance history'),
    el('div',{class:'note'},'History is SCANTRACK-derived (no SPR) and builds up as more nights are dispatched. '+
      'It will populate automatically — net, scan-PPH, headcount and roster per belt / zone / loader over time.'))); return v; }
  if(H.n_nights<2){ v.append(el('div',{class:'card'},el('h2',{},'Performance history'),
    el('div',{class:'note'},`Only ${H.n_nights} night recorded so far. Trends appear once a second night is dispatched.`))); }
  const c=el('div',{class:'card'}); c.append(el('h2',{},'Outbound trend (SCANTRACK scan-PPH)'));
  c.append(el('div',{html:lineChart([
    {label:'scan-PPH',color:'var(--amber)',pts:H.nights.map(n=>n.scan_pph)}],{xlabels:H.dates,h:190})}));
  c.append(el('div',{class:'note'},'Scan-PPH = net ÷ active scan hours, SCANTRACK only (the SPR is never used in history).'));
  v.append(c);
  const zc=el('div',{class:'card'}); zc.append(el('h2',{},'Zone scan-PPH over time'));
  const zser=Object.entries(H.zones||{}).map(([z,arr])=>({label:'Zone '+z,color:ZCOLOR[z]||'#999',
    pts:H.dates.map(dd=>{const r=arr.find(x=>x.d===dd);return r?r.scan_pph:null;})}));
  zc.append(el('div',{html:lineChart(zser,{xlabels:H.dates,h:190})}));
  zc.append(el('div',{class:'legend'},...zser.map(s=>el('span',{},el('span',{class:'swatch',style:'background:'+s.color}),s.label))));
  v.append(zc);
  return v;
}

// ---------- shell ----------
function buildTabs(){
  const tabs=$('#tabs'); const views=$('#views'); tabs.innerHTML=''; views.innerHTML='';
  const defs=[{id:'overview',label:'Overview',build:viewOverview}];
  ZONES.forEach(z=>defs.push({id:'zone'+z,label:'Zone '+z,build:()=>viewZone(z)}));
  defs.push({id:'loaders',label:'Loaders',build:viewLoaders});
  defs.push({id:'history',label:'History',build:viewHistory});
  defs.forEach(d=>{ const btn=el('button',{},d.label); btn.dataset.id=d.id;
    btn.onclick=()=>activate(d.id); tabs.append(btn);
    const sec=el('section',{class:'tab',id:'tab-'+d.id}); sec.append(d.build()); views.append(sec); });
  tabs.append(el('div',{class:'spacer'}));
  activate('overview');
}
function activate(id){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active','printing'));
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  const sec=$('#tab-'+id); if(sec)sec.classList.add('active'); window.__active=id; }

function init(){
  $('#profileTag').textContent=(META.profile||'').toUpperCase();
  const w=META.window||{};
  $('#metaSub').innerHTML=`Sort date <b>${META.sort_date||'?'}</b> · window <b>${w.start||'?'}–${w.down||'?'}</b>`+
    `${w.crosses_midnight?' (crosses midnight)':''} · ${beltsActive.length} active belts · ${ZONES.length} zones`+
    `${hasSor?'':' · <span class="pill mut">no SPR — scan-PPH only</span>'} · generated ${(META.generated||'').slice(0,16).replace('T',' ')}`;
  buildTabs();
  $('#printCurrent').onclick=()=>{ const sec=$('#tab-'+window.__active); if(sec){sec.classList.add('printing');
    setTimeout(()=>{window.print(); sec.classList.remove('printing');},80);} };
}
init();
</script>
